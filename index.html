<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live SharePoint Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">My Live Data Insights</h1>
        <p class="text-sm text-gray-500 mb-6">Pipeline updates automatically from Excel source.</p>
        
        <div class="relative h-96 w-full">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        // Fetch the JSON file generated by GitHub Actions
        fetch('./dashboard_data.json')
            .then(response => response.json())
            .then(data => {
                console.log("Loaded Data:", data);
                
                // --- CUSTOMIZE YOUR VISUALIZATION HERE ---
                // For this example, let's assume your excel sheet has columns named 'Label' and 'Value'
                const labels = data.map(row => row.Label || "Unknown");
                const values = data.map(row => row.Value || 0);

                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Metrics',
                            data: values,
                            backgroundColor: 'rgba(59, 130, 246, 0.5)',
                            borderColor: 'rgb(59, 130, 246)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
            })
            .catch(error => console.error("Error loading dashboard data:", error));
    </script>
</body>
</html>
