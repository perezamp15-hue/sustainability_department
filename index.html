<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Wisely Monthly Insights</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-red-700 text-white shadow-md p-6 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Waste Wisely</h1>
                <p class="text-red-100 text-sm mt-1">Keck Medicine Mediwaste Logistics & Tracking Platform</p>
            </div>
            <span class="bg-red-800 text-xs px-3 py-1.5 font-mono rounded-full border border-red-500/30">Pipeline Status: Active</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Evaluated Volume</p>
                <h3 class="text-3xl font-black text-slate-900 mt-2" id="kpi-weight">0 <span class="text-sm font-medium text-slate-500">lbs</span></h3>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Logistics Expenditure</p>
                <h3 class="text-3xl font-black text-emerald-600 mt-2" id="kpi-cost">$0.00</h3>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Manifest Records Processed</p>
                <h3 class="text-3xl font-black text-slate-900 mt-2" id="kpi-records">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col h-[450px]">
                <h2 class="text-lg font-bold text-slate-900 mb-4">Disposal Trends Over Time</h2>
                <div class="relative flex-1 min-h-0 w-full">
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col h-[450px]">
                <h2 class="text-lg font-bold text-slate-900 mb-4">Volume Distribution by Facility Site</h2>
                <div class="relative flex-1 min-h-0 w-full">
                    <canvas id="siteChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        fetch('./dashboard_data.json')
            .then(res => res.json())
            .then(payload => {
                // Populate summary statistics cards
                document.getElementById('kpi-weight').innerHTML = `${payload.kpis.total_weight_lbs.toLocaleString()} <span class="text-sm font-medium text-slate-500">lbs</span>`;
                document.getElementById('kpi-cost').textContent = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(payload.kpis.total_cost_usd);
                document.getElementById('kpi-records').textContent = payload.kpis.total_records.toLocaleString();

                // 1. Setup Timeline Chart (Historical Trends)
                const timelineMonths = payload.monthly_timeline.map(item => item.MonthYear);
                const timelineLbs = payload.monthly_timeline.map(item => item.lbs);
                const timelineCosts = payload.monthly_timeline.map(item => item.cost);

                new Chart(document.getElementById('timelineChart').getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: timelineMonths,
                        datasets: [
                            {
                                label: 'Disposal Weight (lbs)',
                                data: timelineLbs,
                                borderColor: 'rgb(59, 130, 246)',
                                backgroundColor: 'rgba(59, 130, 246, 0.05)',
                                tension: 0.2,
                                yAxisID: 'y'
                            },
                            {
                                label: 'Expenditure ($)',
                                data: timelineCosts,
                                borderColor: 'rgb(16, 185, 129)',
                                backgroundColor: 'transparent',
                                tension: 0.2,
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Pounds' } },
                            y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'USD' }, grid: { drawOnChartArea: false } }
                        }
                    }
                });

                // 2. Setup Site Distribution Chart (Doughnut)
                const siteLabels = payload.site_breakdown.map(item => item.Site Name || "Unknown Facility");
                const siteLbs = payload.site_breakdown.map(item => item.lbs);

                new Chart(document.getElementById('siteChart').getContext('2d'), {
                    type: 'doughnut',
                    data: {
                        labels: siteLabels,
                        datasets: [{
                            data: siteLbs,
                            backgroundColor: [
                                'rgba(185, 28, 28, 0.7)',
                                'rgba(30, 41, 59, 0.7)',
                                'rgba(217, 119, 6, 0.7)',
                                'rgba(13, 148, 136, 0.7)',
                                'rgba(79, 70, 229, 0.7)'
                            ],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16 } }
                        }
                    }
                });
            })
            .catch(err => console.error("Could not load dashboard data payload:", err));
    </script>
</body>
</html>
