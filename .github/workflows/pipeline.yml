name: Consolidated Data Refresh

on:
  schedule:
    - cron: '0 0 * * *'  # Runs nightly
  push:
    paths:
      - 'raw_data_inputs/**'  # Runs when files are added to this folder
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    # ─── ADD THIS PERMISSIONS BLOCK HERE ───
    permissions:
      contents: write    # Grants the bot permission to push dashboard_data.json back to your repo
    # ───────────────────────────────────────

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Tools
      run: pip install pandas requests openpyxl

    - name: Run Consolidation Pipeline
      run: python fetch_data.py

    - name: Commit Master Dataset back to GitHub
      run: |
        git config --global user.name "Data Consolidation Bot"
        git config --global user.email "actions@github.com"
        git add dashboard_data.json
        git commit -m "Automated compile of master table: $(date)" || exit 0
        git push
