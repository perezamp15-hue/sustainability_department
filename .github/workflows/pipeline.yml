name: SharePoint Data Refresh

on:
  schedule:
    - cron: '0 0 * * *'  # Runs automatically every single day at midnight
  workflow_dispatch:      # Gives you a button in GitHub to run it manually whenever you want

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Tools
      run: pip install pandas requests openpyxl

    - name: Run Extraction Pipeline
      run: python fetch_data.py

    - name: Commit Updated Data to GitHub
      run: |
        git config --global user.name "Data Pipeline Bot"
        git config --global user.email "actions@github.com"
        git add dashboard_data.json
        git commit -m "Automated update of SharePoint data: $(date)" || exit 0
        git push
