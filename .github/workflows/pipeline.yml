name: Consolidated Data Refresh

on:
  schedule:
    - cron: '0 0 * * *'  # Runs nightly
  push:
    paths:
      - 'raw_data_inputs/**'  # Runs when files are added to this folder
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    # Grants the bot permission to push updated JSON data back to your repo
    permissions:
      contents: write

    steps:
    - name: Check out repo code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Tools
      run: pip install pandas requests openpyxl

    - name: Run Consolidation Pipeline
      run: python fetch_data.py

    # ─── ADDED: RUN THE NEW SURGICAL EFFICIENCY PIPELINE ───
    - name: Run Surgical Efficiency Pipeline
      run: python fetch_surgery_data.py
    # ────────────────────────────────────────────────────────

    - name: Commit Master Datasets back to GitHub
      run: |
        git config --global user.name "Data Consolidation Bot"
        git config --global user.email "actions@github.com"
        
        # Stages both pipeline output files for the commit
        git add dashboard_data.json surgery_efficiency_data.json
        
        git commit -m "Automated compile of master data tables: $(date)" || exit 0
        git push
